# ==============================================
# Docker Compose: LiveKit SFU + Egress + Ingress
# ==============================================
#
# Runs LiveKit server (Go SFU) alongside MiroTalk SFU.
# Includes optional Egress (recording/RTMP out) and Ingress (RTMP/WHIP in) services.
#
# Usage:
#   # LiveKit server only:
#   docker compose -f docker-compose.livekit.yml up livekit-server
#
#   # Full stack with recording + RTMP:
#   docker compose -f docker-compose.livekit.yml up
#
#   # Combined with MiroTalk:
#   docker compose -f docker-compose.template.yml -f docker-compose.livekit.yml up
#
# Prerequisites:
#   1. Set LIVEKIT_API_KEY and LIVEKIT_API_SECRET in .env
#   2. Update livekit.yaml keys section to match
#   3. Set LIVEKIT_ENABLED=true in .env
#
# Ports:
#   7880 - LiveKit signaling (WebSocket/HTTP)
#   7881 - LiveKit RTC over TCP
#   3478 - TURN UDP
#   5349 - TURN TLS
#   50000-60000 - WebRTC media (UDP)
#   1935 - RTMP ingress (if enabled)
#   8080 - WHIP ingress (if enabled)

services:
    # ==========================================
    # LiveKit Server (Go SFU)
    # ==========================================
    # The core media server. Handles all WebRTC connections,
    # simulcast, SVC, bandwidth estimation, and TURN.
    #
    # Resources: ~100MB RAM base + ~2MB per participant
    # CPU: 1 core handles ~50-100 participants
    livekit-server:
        image: livekit/livekit-server:latest
        container_name: livekit-server
        hostname: livekit-server
        restart: unless-stopped
        command: --config /etc/livekit.yaml
        ports:
            - '7880:7880/tcp'     # HTTP + WebSocket signaling
            - '7881:7881/tcp'     # RTC over TCP fallback
            - '3478:3478/udp'     # TURN UDP
            - '5349:5349/tcp'     # TURN TLS
            - '50000-60000:50000-60000/udp'  # WebRTC media
        volumes:
            - ./livekit.yaml:/etc/livekit.yaml:ro
        environment:
            # Override config via env vars (optional)
            - LIVEKIT_KEYS=${LIVEKIT_API_KEY:-streamlive}: ${LIVEKIT_API_SECRET:-streamlive_secret_change_me}
        networks:
            - streamlive
        healthcheck:
            test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:7880']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s

    # ==========================================
    # Redis (required for Egress + Ingress)
    # ==========================================
    # Coordinates between LiveKit server and Egress/Ingress services.
    # Also enables multi-node LiveKit clustering.
    #
    # Resources: ~50MB RAM
    redis:
        image: redis:7-alpine
        container_name: livekit-redis
        hostname: redis
        restart: unless-stopped
        ports:
            - '6379:6379/tcp'
        volumes:
            - livekit-redis-data:/data
        networks:
            - streamlive
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 3s
            retries: 5

    # ==========================================
    # LiveKit Egress (Recording + RTMP out)
    # ==========================================
    # Handles server-side recording and RTMP streaming.
    # Room Composite: renders room in headless Chrome + GStreamer
    # Track Egress: records individual tracks directly
    #
    # Resources: ~4GB RAM + 4 CPU per concurrent recording
    # Requires: Redis, Chrome (included in image)
    livekit-egress:
        image: livekit/egress:latest
        container_name: livekit-egress
        hostname: livekit-egress
        restart: unless-stopped
        environment:
            - EGRESS_CONFIG_FILE=/etc/egress.yaml
        volumes:
            - ./livekit-egress.yaml:/etc/egress.yaml:ro
            - livekit-egress-data:/out   # Recording output
        depends_on:
            redis:
                condition: service_healthy
            livekit-server:
                condition: service_healthy
        networks:
            - streamlive
        # Egress needs elevated caps for Chrome sandbox
        cap_add:
            - SYS_ADMIN

    # ==========================================
    # LiveKit Ingress (RTMP/WHIP in)
    # ==========================================
    # Accepts RTMP streams (from OBS, hardware encoders)
    # and WHIP streams, publishes them into LiveKit rooms.
    #
    # Resources: ~500MB RAM per active ingress
    # Ports: 1935 (RTMP), 8080 (WHIP)
    livekit-ingress:
        image: livekit/ingress:latest
        container_name: livekit-ingress
        hostname: livekit-ingress
        restart: unless-stopped
        environment:
            - INGRESS_CONFIG_FILE=/etc/ingress.yaml
        volumes:
            - ./livekit-ingress.yaml:/etc/ingress.yaml:ro
        ports:
            - '1935:1935/tcp'    # RTMP
            - '8080:8080/tcp'    # WHIP
        depends_on:
            redis:
                condition: service_healthy
            livekit-server:
                condition: service_healthy
        networks:
            - streamlive

volumes:
    livekit-redis-data:
        driver: local
    livekit-egress-data:
        driver: local

networks:
    streamlive:
        driver: bridge
