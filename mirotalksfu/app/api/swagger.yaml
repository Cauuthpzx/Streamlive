swagger: '2.0'

info:
    title: MiroTalk SFU API
    description: API description for external applications that integrate with MiroTalk SFU.
    version: 1.0.1

basePath: /api/v1

schemes:
    - https
    - http

paths:
    /stats:
        get:
            tags:
                - 'stats'
            summary: 'Get stats'
            description: 'Get meetings'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Get Stats done'
                    schema:
                        $ref: '#/definitions/StatsResponse'
                '403':
                    description: 'Unauthorized!'

    /meetings:
        get:
            tags:
                - 'meetings'
            summary: 'Get meetings'
            description: 'Get meetings'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Get Meetings done'
                    schema:
                        $ref: '#/definitions/MeetingsResponse'
                '403':
                    description: 'Unauthorized!'
    /meeting:
        post:
            tags:
                - 'meeting'
            summary: 'Create meeting'
            description: 'Create meeting'
            consumes:
                - 'application/json'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Meeting created'
                    schema:
                        $ref: '#/definitions/MeetingResponse'
                '403':
                    description: 'Unauthorized!'
    /meeting/{room}:
        delete:
            tags:
                - 'meeting'
            summary: 'End meeting'
            description: 'End an active meeting by room name. All connected peers will be disconnected and redirected to the specified URL or home page.'
            parameters:
                - in: path
                  name: room
                  required: true
                  type: string
                  description: 'The room name/ID of the meeting to end'
                - in: body
                  name: body
                  required: false
                  description: 'Optional body with redirect URL'
                  schema:
                      $ref: '#/definitions/EndMeetingRequest'
            consumes:
                - 'application/json'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Meeting ended successfully'
                    schema:
                        $ref: '#/definitions/EndMeetingResponse'
                '403':
                    description: 'Unauthorized!'
                '404':
                    description: 'Room not found'
    /join:
        post:
            tags:
                - 'join'
            summary: 'Create direct join'
            description: 'Create join'
            parameters:
                - in: body
                  name: Join
                  description: Custom Join URL.
                  schema:
                      $ref: '#/definitions/JoinRequest'
            consumes:
                - 'application/json'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Direct join created'
                    schema:
                        $ref: '#/definitions/JoinResponse'
                '403':
                    description: 'Unauthorized!'
    /token:
        post:
            tags:
                - 'token'
            summary: 'Get token'
            description: 'Get token'
            parameters:
                - in: body
                  name: token
                  description: Custom Token.
                  schema:
                      $ref: '#/definitions/TokenRequest'
            consumes:
                - 'application/json'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Get token done'
                    schema:
                        $ref: '#/definitions/TokenResponse'
                '403':
                    description: 'Unauthorized!'

    # ==========================================
    # LiveKit Integration Endpoints
    # ==========================================

    /livekit/token:
        post:
            tags:
                - 'livekit'
            summary: 'Generate LiveKit access token'
            description: 'Generate a JWT access token for connecting to LiveKit server. Requires LiveKit to be enabled.'
            parameters:
                - in: body
                  name: body
                  required: true
                  schema:
                      $ref: '#/definitions/LiveKitTokenRequest'
            consumes:
                - 'application/json'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Token generated'
                    schema:
                        $ref: '#/definitions/LiveKitTokenResponse'
                '403':
                    description: 'Unauthorized'
                '500':
                    description: 'LiveKit not enabled or error generating token'

    /livekit/room-token:
        post:
            tags:
                - 'livekit'
            summary: 'Generate LiveKit room token'
            description: 'Generate a token for joining a specific LiveKit room (for existing Socket.io clients).'
            parameters:
                - in: body
                  name: body
                  required: true
                  schema:
                      $ref: '#/definitions/LiveKitTokenRequest'
            consumes:
                - 'application/json'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Room token generated'
                    schema:
                        $ref: '#/definitions/LiveKitTokenResponse'
                '403':
                    description: 'Unauthorized'

    /livekit/rooms:
        get:
            tags:
                - 'livekit'
            summary: 'List active LiveKit rooms'
            description: 'Returns all active rooms on the LiveKit server with participant counts.'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Active rooms list'
                    schema:
                        $ref: '#/definitions/LiveKitRoomsResponse'
                '403':
                    description: 'Unauthorized'

    /livekit/room/{roomName}:
        get:
            tags:
                - 'livekit'
            summary: 'Get LiveKit room stats'
            description: 'Returns detailed statistics for a specific LiveKit room.'
            parameters:
                - in: path
                  name: roomName
                  required: true
                  type: string
                  description: 'Room name'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Room stats'
                    schema:
                        $ref: '#/definitions/LiveKitRoomStatsResponse'
                '403':
                    description: 'Unauthorized'

    /livekit/recording/start:
        post:
            tags:
                - 'livekit'
            summary: 'Start LiveKit recording'
            description: 'Start recording a LiveKit room using Egress service. Requires Egress to be running.'
            parameters:
                - in: body
                  name: body
                  required: true
                  schema:
                      $ref: '#/definitions/LiveKitRecordingRequest'
            consumes:
                - 'application/json'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Recording started'
                '403':
                    description: 'Unauthorized'
                '500':
                    description: 'Failed to start recording'

    /livekit/recording/stop:
        post:
            tags:
                - 'livekit'
            summary: 'Stop LiveKit recording'
            description: 'Stop an active recording/egress.'
            parameters:
                - in: body
                  name: body
                  required: true
                  schema:
                      type: object
                      properties:
                          roomName:
                              type: string
            consumes:
                - 'application/json'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Recording stopped'
                '403':
                    description: 'Unauthorized'

    /livekit/rtmp/start:
        post:
            tags:
                - 'livekit'
            summary: 'Start RTMP stream via LiveKit'
            description: 'Start RTMP streaming from a LiveKit room to external services (YouTube, Twitch, etc).'
            parameters:
                - in: body
                  name: body
                  required: true
                  schema:
                      $ref: '#/definitions/LiveKitRtmpRequest'
            consumes:
                - 'application/json'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'RTMP stream started'
                '403':
                    description: 'Unauthorized'

    /livekit/ingress/create:
        post:
            tags:
                - 'livekit'
            summary: 'Create RTMP/WHIP ingress'
            description: 'Create an ingress point for external RTMP/WHIP streams (OBS, hardware encoders) into a LiveKit room.'
            parameters:
                - in: body
                  name: body
                  required: true
                  schema:
                      $ref: '#/definitions/LiveKitIngressRequest'
            consumes:
                - 'application/json'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Ingress created with stream URL and key'
                '403':
                    description: 'Unauthorized'

    /livekit/webhook:
        post:
            tags:
                - 'livekit'
            summary: 'LiveKit webhook receiver'
            description: 'Receives webhook events from LiveKit server (room created, participant joined, etc).'
            consumes:
                - 'application/webhook+json'
            produces:
                - 'application/json'
            responses:
                '200':
                    description: 'Webhook processed'

    /livekit/health:
        get:
            tags:
                - 'livekit'
            summary: 'LiveKit health check'
            description: 'Check if LiveKit integration is enabled and the server is reachable.'
            produces:
                - 'application/json'
            security:
                - secretApiKey: []
            responses:
                '200':
                    description: 'Health status'
                    schema:
                        $ref: '#/definitions/LiveKitHealthResponse'
                '403':
                    description: 'Unauthorized'

securityDefinitions:
    secretApiKey:
        type: 'apiKey'
        name: 'authorization'
        in: 'header'
        description: 'Format like this: authorization: {API_KEY_SECRET}'

definitions:
    StatsResponse:
        type: object
        properties:
            success:
                type: boolean
            timestamp:
                type: string
                format: date-time
                example: '2025-12-21T12:00:00Z'
            totalRooms:
                type: integer
            totalPeers:
                type: integer
    MeetingsResponse:
        type: object
        properties:
            meetings:
                type: array
                items:
                    $ref: '#/definitions/Meeting'
    MeetingResponse:
        type: 'object'
        properties:
            meeting:
                type: string
    JoinRequest:
        type: object
        properties:
            room:
                type: string
                default: 'test'
            roomPassword:
                type: ['boolean', 'string'] # Allow boolean or string type
                default: false
            name:
                type: string
                default: 'mirotalksfu'
            avatar:
                type: ['boolean', 'string'] # Allow boolean or string type
                default: false
            audio:
                type: boolean
                default: false
            video:
                type: boolean
                default: false
            screen:
                type: boolean
                default: false
            chat:
                type: boolean
                default: false
            hide:
                type: boolean
                default: false
            notify:
                type: boolean
                default: false
            duration:
                type: string
                default: 'unlimited'
            token:
                $ref: '#/definitions/TokenRequest'
    TokenRequest:
        type: object
        properties:
            username:
                type: string
                default: 'username'
            password:
                type: string
                default: 'password'
            presenter:
                type: boolean
                default: true
            expire:
                type: string
                default: '1h'
    EndMeetingRequest:
        type: object
        properties:
            redirect:
                type: string
                description: 'URL to redirect peers to after the meeting ends. If empty, peers are redirected to the home page.'
                default: ''
    EndMeetingResponse:
        type: 'object'
        properties:
            success:
                type: boolean
            message:
                type: string
            room:
                type: string
    JoinResponse:
        type: 'object'
        properties:
            join:
                type: string
    TokenResponse:
        type: 'object'
        properties:
            token:
                type: string
    Peer:
        type: object
        properties:
            name:
                type: string
            avatar:
                type: string
            presenter:
                type: boolean
            video:
                type: boolean
            audio:
                type: boolean
            screen:
                type: boolean
            hand:
                type: boolean
            os:
                type: string
            browser:
                type: string

    Meeting:
        type: object
        properties:
            roomId:
                type: string
            peers:
                type: array
                items:
                    $ref: '#/definitions/Peer'

    # ==========================================
    # LiveKit Definitions
    # ==========================================

    LiveKitTokenRequest:
        type: object
        required:
            - identity
            - room
        properties:
            identity:
                type: string
                description: 'Unique participant identity'
                default: 'user1'
            room:
                type: string
                description: 'Room name to join'
                default: 'test-room'
            canPublish:
                type: boolean
                description: 'Allow publishing audio/video'
                default: true
            canSubscribe:
                type: boolean
                description: 'Allow subscribing to others'
                default: true

    LiveKitTokenResponse:
        type: object
        properties:
            token:
                type: string
                description: 'JWT access token for LiveKit server'
            wsUrl:
                type: string
                description: 'LiveKit WebSocket URL to connect to'

    LiveKitRoomsResponse:
        type: object
        properties:
            rooms:
                type: array
                items:
                    type: object
                    properties:
                        name:
                            type: string
                        numParticipants:
                            type: integer
                        maxParticipants:
                            type: integer
                        creationTime:
                            type: string

    LiveKitRoomStatsResponse:
        type: object
        properties:
            room:
                type: object
                properties:
                    name:
                        type: string
                    numParticipants:
                        type: integer
            participants:
                type: array
                items:
                    type: object
                    properties:
                        identity:
                            type: string
                        state:
                            type: string
                        tracks:
                            type: integer

    LiveKitRecordingRequest:
        type: object
        required:
            - roomName
        properties:
            roomName:
                type: string
                description: 'Room to record'
            outputFile:
                type: string
                description: 'Output file path (optional)'

    LiveKitRtmpRequest:
        type: object
        required:
            - roomName
            - rtmpUrl
        properties:
            roomName:
                type: string
                description: 'Room to stream'
            rtmpUrl:
                type: string
                description: 'RTMP destination URL (e.g., rtmp://live.twitch.tv/app/stream-key)'

    LiveKitIngressRequest:
        type: object
        required:
            - roomName
            - participantIdentity
        properties:
            roomName:
                type: string
                description: 'Target room for the ingress stream'
            participantIdentity:
                type: string
                description: 'Identity for the ingress participant'
            participantName:
                type: string
                description: 'Display name for the ingress participant'

    LiveKitHealthResponse:
        type: object
        properties:
            enabled:
                type: boolean
            connected:
                type: boolean
            server:
                type: string
                description: 'LiveKit server URL'
            rooms:
                type: integer
                description: 'Number of active rooms'
